name: Deploy preview to GitHub Pages

# Временное превью, пока нет домена. Сайт собирается в подпапку репозитория
# (art-frich.github.io/otdelka19/) и помечается noindex, чтобы не индексировался.
# Бой (Yandex Object Storage, корень домена) этот воркфлоу не трогает.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: https://art-frich.github.io
      PUBLIC_BASE_PATH: /otdelka19/
      PUBLIC_PREVIEW: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
