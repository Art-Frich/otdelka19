# Sveltia CMS — конфигурация
# Бэкенд — GitHub. Вход в админку проще всего по личному токену (Personal Access
# Token, fine-grained, доступ только к этому репозиторию) — это полностью serverless,
# никакого OAuth-релея не нужно. OAuth (вход одной кнопкой) опционален: для него
# поднимается мини-функция sveltia-cms-auth (напр. на Yandex Cloud Functions).
# Перед боевым использованием: создать репозиторий на GitHub и указать его в backend.repo.
# Локально: запусти dev-сервер, открой /admin/ в Chrome или Edge и нажми
# «Work with Local Repository» — Sveltia правит файлы напрямую через File System API
# (без GitHub и без прокси). Прокси/local_backend Sveltia не использует.

backend:
  name: github
  repo: Art-Frich/otdelka19 # превью-репо; для боя заменить на боевой owner/repo
  branch: main
  auth_methods:
    - token
    - oauth

locale: ru
media_folder: 'public/img/uploads'
public_folder: '/img/uploads'

# Авто-оптимизация ВСЕХ загружаемых картинок: конвертация в WebP + ресайз до 1920px.
media_library:
  config:
    max_file_size: 12582912 # 12 МБ
    transformations:
      raster_image:
        format: webp
        quality: 80
        width: 1920
        height: 1920

collections:
  - name: projects
    label: 'Кейсы портфолио'
    label_singular: 'Кейс'
    description: 'Объекты до/после. Каждый кейс — отдельная страница на сайте.'
    folder: 'src/content/projects'
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    # Фото кейса грузятся в папку именно этого проекта (а не в общий uploads)
    media_folder: '/public/img/projects/{{slug}}'
    public_folder: '/img/projects/{{slug}}'
    sortable_fields: ['order', 'publishDate', 'title']
    fields:
      - { name: title, label: 'Заголовок (объект)', widget: string, hint: 'Напр.: 2-комнатная квартира' }
      - name: type
        label: 'Тип работ'
        widget: relation
        collection: settings
        file: site
        value_field: 'services.*.title'
        search_fields: ['services.*.title']
        display_fields: ['services.*.title']
        hint: 'Берётся из списка услуг (Настройки → Услуги) — единый источник, без дублей.'
      - { name: summary, label: 'Краткое описание', widget: text }
      - { name: area, label: 'Площадь, м²', widget: number, required: false, value_type: int, min: 1 }
      - { name: district, label: 'Район / адрес', widget: string, required: false }
      - { name: duration, label: 'Сроки (напр.: 45 дней)', widget: string, required: false }
      - { name: beforeImage, label: 'Фото ДО (для слайдера)', widget: image, required: false }
      - {
          name: afterImage,
          label: 'Фото ПОСЛЕ (для слайдера)',
          widget: image,
          required: false,
        }
      - name: gallery
        label: 'Фото объекта (галерея)'
        widget: list
        required: false
        hint: 'Первое фото — обложка карточки. Для кейсов с «до/после» (есть слайдер) сюда добавляйте только дополнительные кадры — до/после попадут в галерею сами.'
        fields:
          - { name: src, label: 'Фото', widget: image }
          - { name: alt, label: 'Подпись', widget: string, required: false }
      - { name: order, label: 'Порядок (больше = выше)', widget: number, default: 0, value_type: int }
      - {
          name: publishDate,
          label: 'Дата',
          widget: datetime,
          required: false,
          date_format: 'YYYY-MM-DD',
          time_format: false,
        }
      - { name: draft, label: 'Черновик (не публиковать)', widget: boolean, default: false }
      - name: seo
        label: 'SEO (необязательно)'
        widget: object
        collapsed: true
        required: false
        fields:
          - { name: title, label: 'SEO заголовок', widget: string, required: false }
          - { name: description, label: 'SEO описание', widget: text, required: false }
      - {
          name: body,
          label: 'Описание работ (этапы)',
          widget: markdown,
          required: false,
        }

  - name: settings
    label: 'Настройки сайта'
    editor: { preview: false }
    files:
      - name: site
        label: 'Контакты и тексты'
        file: 'src/data/site.json'
        fields:
          - { name: brand, label: 'Бренд', widget: string }
          - { name: slogan, label: 'Слоган', widget: string, required: false }
          - { name: masterName, label: 'Имя мастера', widget: string, required: false }
          - { name: masterPhoto, label: 'Фото мастера', widget: image, required: false }
          - { name: about, label: 'О мастере (текст)', widget: text, required: false }
          - { name: phone, label: 'Телефон', widget: string }
          - name: socials
            label: 'Соцсети и мессенджеры'
            widget: list
            required: false
            summary: '{{fields.type}} — {{fields.url}}'
            fields:
              - {
                  name: type,
                  label: 'Площадка',
                  widget: select,
                  options: ['max', 'vk', 'telegram', 'instagram'],
                }
              - { name: url, label: 'Ссылка', widget: string }
          - { name: workingHours, label: 'Часы работы', widget: string }
          - {
              name: areaServed,
              label: 'География работы',
              widget: list,
              hint: 'Города, где работает мастер. Видны списком в блоке «Контакты» и в подвале сайта. Первый город дополнительно уходит в невидимую SEO-разметку (Schema.org, поле addressLocality) как город компании — это помогает Яндексу привязать сайт к городу.',
              field: { name: city, label: 'Город', widget: string },
            }
          - {
              name: priceUrl,
              label: 'Ссылка на прайс',
              widget: string,
              required: false,
              hint: 'Любая ссылка: таблица, PDF или страница. Пусто — блок прайса скрыт.',
            }
          - name: hero
            label: 'Первый экран'
            widget: object
            fields:
              - { name: eyebrow, label: 'Надзаголовок', widget: string }
              - { name: image, label: 'Картинка на первом экране', widget: image, required: false }
              - { name: title, label: 'Заголовок H1', widget: string }
              - { name: lead, label: 'Подзаголовок', widget: text }
              - name: stats
                label: 'Цифры (3 шт.)'
                widget: list
                fields:
                  - { name: n, label: 'Значение', widget: string }
                  - { name: l, label: 'Подпись', widget: string }
          - { name: servicesIntro, label: 'Услуги — вступление', widget: text }
          - name: services
            label: 'Услуги'
            widget: list
            fields:
              - { name: icon, label: 'Иконка (символ)', widget: string }
              - { name: title, label: 'Название', widget: string }
              - { name: text, label: 'Описание', widget: text }
          - name: seo
            label: 'SEO по умолчанию'
            widget: object
            collapsed: true
            hint: 'Как сайт выглядит в поиске и при отправке ссылки. Применяется ко всем страницам, у которых не задан свой SEO.'
            fields:
              - {
                  name: titleDefault,
                  label: 'Заголовок главной',
                  widget: string,
                  hint: 'Вкладка браузера и синяя ссылка в выдаче Яндекса/Google. До ~60 символов.',
                }
              - {
                  name: titleTemplate,
                  label: 'Шаблон заголовка остальных страниц',
                  widget: string,
                  hint: '%s заменяется названием страницы. Напр.: «Портфолио — Отделка 19».',
                }
              - {
                  name: description,
                  label: 'Описание для поиска',
                  widget: text,
                  hint: 'Серый текст под ссылкой в выдаче, ~150–160 символов. Честно про услугу.',
                }
              - {
                  name: ogImage,
                  label: 'Картинка-превью ссылки',
                  widget: image,
                  required: false,
                  hint: 'Показывается при отправке ссылки в Telegram/WhatsApp/соцсети. Загрузите картинку ~1200×630 — путь подставится сам, вручную ничего писать не нужно.',
                }
